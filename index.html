<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wikipedia Dev Docs</title>
    <style>
        :root {
            --bg: #0f111a;
            --sidebar-bg: #1a1c25;
            --text: #eceff4;
            --accent: #81a1c1;
            --border: #434c5e;
            --code-bg: #2e3440;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
        }

        nav {
            width: 280px;
            background: var(--sidebar-bg);
            height: 100vh;
            position: fixed;
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            box-sizing: border-box;
        }

        nav h1 { font-size: 1.1rem; color: var(--accent); margin-bottom: 40px; letter-spacing: 2px; text-transform: uppercase; }
        nav ul { list-style: none; padding: 0; }
        nav li { margin-bottom: 15px; }
        nav a { text-decoration: none; color: var(--text); opacity: 0.6; cursor: pointer; transition: 0.2s; font-size: 0.95rem; }
        nav a:hover { opacity: 1; color: var(--accent); }

        main { margin-left: 280px; padding: 60px; max-width: 900px; width: 100%; }
        h1 { color: var(--accent); font-size: 2.5rem; margin-top: 0; }
        h2 { color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-top: 40px; }
        
        pre { background: var(--code-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--border); overflow-x: auto; color: #d8dee9; }
        code { font-family: 'Consolas', monospace; color: #ebcb8b; }
        
        .lang-switch { position: absolute; bottom: 30px; left: 20px; display: flex; gap: 8px; }
        .lang-btn { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        .lang-btn:hover { background: var(--accent); color: var(--bg); }
    </style>
</head>
<body>

<nav>
    <h1 id="nav-title">Wiki Docs</h1>
    <ul>
        <li><a onclick="render('intro')">Вступ / Intro</a></li>
        <li><a onclick="render('syntax')">Синтаксис / Syntax</a></li>
        <li><a onclick="render('api')">MediaWiki API</a></li>
    </ul>
    <div class="lang-switch">
        <button class="lang-btn" onclick="setLang('uk')">UA</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
</nav>

<main id="app"></main>

<script>
    const content = {
        'uk': {
            intro: `<h1>Документація Вікіпедії</h1><p>Вікіпедія побудована на <b>MediaWiki</b> — потужному рушії для створення вікі-проектів.</p><h2>Архітектура</h2><ul><li>Мова: PHP</li><li>База даних: MySQL / MariaDB</li><li>Кешування: Memcached / Redis</li></ul>`,
            syntax: `<h1>Вікі-розмітка</h1><p>Використовується для редагування сторінок.</p><pre><code>== Заголовок ==\n[[Внутрішнє посилання]]\n[http://google.com Зовнішнє]\n'''Жирний текст'''</code></pre>`,
            api: `<h1>MediaWiki API</h1><p>Запит для отримання контенту сторінки:</p><pre><code>GET /w/api.php?action=query&prop=revisions&titles=Main_Page&rvprop=content&format=json</code></pre>`
        },
        'en': {
            intro: `<h1>Wiki Documentation</h1><p>Wikipedia is powered by <b>MediaWiki</b>, a free and open-source wiki software.</p><h2>Architecture</h2><ul><li>Language: PHP</li><li>Database: MySQL / MariaDB</li><li>Caching: Memcached / Redis</li></ul>`,
            syntax: `<h1>Wikitext Syntax</h1><p>Used for editing wiki pages.</p><pre><code>== Heading ==\n[[Internal Link]]\n[http://google.com External]\n'''Bold Text'''</code></pre>`,
            api: `<h1>MediaWiki API</h1><p>Example request to get page content:</p><pre><code>GET /w/api.php?action=query&prop=revisions&titles=Main_Page&rvprop=content&format=json</code></pre>`
        }
    };

    let lang = localStorage.getItem('lang') || 'uk';

    function setLang(l) {
        lang = l;
        localStorage.setItem('lang', l);
        render('intro');
    }

    function render(key) {
        document.getElementById('app').innerHTML = content[lang][key];
    }

    window.onload = () => render('intro');
</script>

</body>
</html>
